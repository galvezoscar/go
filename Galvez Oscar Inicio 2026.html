<script>
 
   // Función para activar pantalla completa con compatibilidad para todos los navegadores
function entrarPantallaCompleta() {
    var elem = document.documentElement;
    
    if (elem.requestFullscreen) {
        elem.requestFullscreen();
    } else if (elem.mozRequestFullScreen) { /* Firefox */
        elem.mozRequestFullScreen();
    } else if (elem.webkitRequestFullscreen) { /* Chrome, Safari y Opera */
        elem.webkitRequestFullscreen();
    } else if (elem.msRequestFullscreen) { /* IE/Edge */
        elem.msRequestFullscreen();
    }
}

// Función que se ejecuta al hacer clic
function activarSiEsPC(e) {
    // Detectar si es Android (si es Android, NO hace nada y se sale)
    if (/Android/i.test(navigator.userAgent)) {
        return;
    }

    // Si llegamos aquí, es PC/Tablet u otro, entonces activar pantalla completa
    entrarPantallaCompleta();

    // IMPORTANTE: Removemos el evento 'click' para que solo pase UNA VEZ.
    // Así, si el usuario vuelve a clickear, no saldrá de pantalla completa.
    document.removeEventListener('click', activarSiEsPC);
}

// Agregamos el evento global al documento
document.addEventListener('click', activarSiEsPC);
   </script>
